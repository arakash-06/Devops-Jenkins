<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps CI/CD Project</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            padding: 10px 20px;
            background: #00c9a7;
            border-radius: 25px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            margin: 30px auto;
            padding: 20px;
            width: 300px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .names {
            margin-top: 20px;
            font-size: 18px;
            color: #ffd369;
            font-weight: bold;
        }

        .footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 CI/CD Pipeline</h1>
        <p>Successfully Deployed using Jenkins on AWS EC2</p>

        <div class="badge">✔ Build Successful</div>

        <div class="card">
            <h3>Pipeline Stages</h3>
            <p>✔ Checkout</p>
            <p>✔ Build</p>
            <p>✔ Test</p>
            <p>✔ Deploy</p>
        </div>

        <div class="names">
            Deployed by:<br>
            Akash A.R.<br>
            Akilesh G.A.<br>
            Bharath P.
        </div>
    </div>

    <div class="footer">
        <p>DevOps Project | Jenkins + AWS + GitHub</p>
    </div>

</body>
</html>
